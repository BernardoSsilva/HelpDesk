services:
  postgres:
    image: postgres:16-alpine
    container_name: ticket-management-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ticket_management
      POSTGRES_USER: ticket_user
      POSTGRES_PASSWORD: ticket_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticket_user -d ticket_management"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
